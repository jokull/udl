{{define "episodes_partial.html"}}
<div class="episodes-container">
{{range .Seasons}}
<div class="season-header">
  <h3>Season {{.Season}}</h3>
  <button class="btn btn-sm {{if .Monitored}}btn-active{{end}}"
    hx-post="/series/{{.SeriesID}}/season/{{.Season}}/toggle"
    hx-target=".episodes-container"
    hx-swap="outerHTML"
    title="{{if .Monitored}}Unmonitor season{{else}}Monitor season{{end}}">
    {{if .Monitored}}Monitored{{else}}Unmonitored{{end}}
  </button>
</div>
<table>
  <tr><th>Episode</th><th>Title</th><th>Air Date</th><th>Status</th><th>Quality</th></tr>
  {{range .Episodes}}
  <tr{{if not .Monitored}} class="unmonitored"{{end}}>
    <td>{{seasonEp .Season .Episode}}</td>
    <td>{{nullable .Title}}</td>
    <td class="small">{{nullable .AirDate}}</td>
    <td><span class="status {{statusClass .Status}}">{{.Status}}</span></td>
    <td>{{nullable .Quality}}</td>
  </tr>
  {{end}}
</table>
{{end}}
</div>
{{end}}
