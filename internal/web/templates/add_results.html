{{define "add_results.html"}}
{{if .Results}}
<table>
  <tr><th>Type</th><th>Title</th><th>Year</th><th></th></tr>
  {{range .Results}}
  <tr>
    <td><span class="badge">{{.Category}}</span></td>
    <td>{{.Title}} <a class="ext" href="{{tmdbURL .Category .TMDBID}}" target="_blank" rel="noopener">tmdb</a></td>
    <td>{{.Year}}</td>
    <td>
      {{if .Exists}}<span class="status downloaded">added</span>
      {{else}}<button class="btn-sm" hx-post="/add/{{.Category}}/{{.TMDBID}}"
        hx-target="closest td" hx-swap="innerHTML">+ Add</button>{{end}}
    </td>
  </tr>
  {{end}}
</table>
{{else if .Query}}
<p class="muted">No results for "{{.Query}}".</p>
{{end}}
{{end}}
